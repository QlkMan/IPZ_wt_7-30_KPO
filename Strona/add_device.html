<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dodaj Urządzenie</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #555; }
        .back { display: block; margin-top: 15px; color: #777; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Nowe Urządzenie</h2>
        <p>Dodajesz sprzęt dla użytkownika #{{ user_id }}</p>
        <form method="POST">
            <input type="text" name="model" placeholder="Wpisz model urządzenia (np. LiDAR v2)..." required>
            <button type="submit">Zarejestruj urządzenie</button>
        </form>
        <a href="/flow/user/{{ user_id }}" class="back">Anuluj i wróć</a>
    </div>
</body>
</html>
