<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wybór usera</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Flow: wybierz usera</h1>

    {% if not users %}
        <p>Brak użytkowników w bazie danych.</p>
    {% else %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nazwa (Name)</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u.id }}</td>
                    <td>{{ u.name }}</td>
                    <td>
                        <a href="/flow/user/{{ u.id }}">
                            <button type="button">Wejdź do usera</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}

    <br>
    <a href="/"><button type="button">Powrót do Home</button></a>
</body>
</html>
