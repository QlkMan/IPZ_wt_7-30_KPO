<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista Urządzeń</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Lista urządzeń (Devices)</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Model</th>
                <th>Status pomiaru</th>
                <th>ID właściciela (User ID)</th>
            </tr>
        </thead>
        <tbody>
            {% for d in devices %}
            <tr>
                <td>{{ d.id }}</td>
                <td>{{ d.model }}</td>
                <td>{{ "Aktywny" if d.start_pomiaru else "Nieaktywny" }}</td>
                <td>{{ d.user_id }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="/">Powrót do strony głównej</a>

</body>
</html>
