<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Sterowania - Orthoget</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .dashboard {
            width: 500px;
            background-color: white;
            border: 2px solid #333;
            padding: 30px;
            box-shadow: 10px 10px 0px #333; /* Styl "retro/techniczny" */
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
            text-transform: uppercase;
            font-size: 0.8em;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .nav-button {
            display: block;
            padding: 15px;
            text-align: center;
            background-color: #fff;
            border: 1px solid #333;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .nav-button:hover {
            background-color: #eef;
            border-width: 2px;
        }
        .btn-main {
            grid-column: span 2; /* Przycisk Flow na całą szerokość */
            background-color: #333;
            color: white;
        }
        .btn-main:hover {
            background-color: #555;
            color: white;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>STACJA POMIAROWA</h1>

        <div class="section">
            <div class="section-title">Główny proces</div>
            <a href="/flow" class="nav-button btn-main">🚀 ROZPOCZNIJ POMIARY (FLOW)</a>
        </div>

        <div class="section">
            <div class="section-title">Przegląd bazy danych</div>
            <div class="menu-grid">
                <a href="/users" class="nav-button">👥 Lista Users</a>
                <a href="/devices" class="nav-button">💻 Lista Devices</a>
            </div>
        </div>

        <div class="section" style="text-align: center; font-size: 0.7em; color: #999; margin-top: 40px;">
            System v1.0 | Zalogowany jako: Orthoget
        </div>
    </div>

</body>
</html>
