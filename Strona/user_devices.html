<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Urządzenia użytkownika</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .user-info {
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Szczegóły użytkownika</h1>

    <div class="user-info">
        <strong>ID:</strong> {{ user.id }} <br>
        <strong>Imię:</strong> {{ user.name }}
    </div>

    <h2>Lista urządzeń (Devices)</h2>

    {% if not devices %}
        <p>Ten użytkownik nie posiada przypisanych urządzeń.</p>
    {% else %}
        <table>
            <thead>
                <tr>
                    <th>ID urządzenia</th>
                    <th>Model</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody>
                {% for d in devices %}
                <tr>
                    <td>{{ d.id }}</td>
                    <td>{{ d.model }}</td>
                    <td>
                        <a href="/flow/device/{{ d.id }}">
                            <button type="button">Wejdź do device</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}

    <br>
    <a href="/flow"><button type="button">Powrót do listy users</button></a>
    <a href="/"><button type="button">Home</button></a>
</body>
</html>
