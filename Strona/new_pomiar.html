<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dodaj nowy pomiar</title>
    <style>
        .form-container {
            border: 1px solid #000;
            padding: 20px;
            width: 300px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Nowy pomiar dla: {{ device.model }}</h1>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label>Wartość (Value):</label>
                <input type="number" name="value" required>
            </div>
            
            <div class="form-group">
                <label>Zakres Start:</label>
                <input type="number" name="zakres_start" required>
            </div>
            
            <div class="form-group">
                <label>Zakres Koniec:</label>
                <input type="number" name="zakres_koniec" required>
            </div>

            <button type="submit" style="background-color: #e7f3ff;">Zapisz pomiar</button>
        </form>
    </div>

    <br>
    <hr>
    <a href="/flow/device/{{ device.id }}">
        <button type="button">Anuluj i wróć</button>
    </a>
</body>
</html>
